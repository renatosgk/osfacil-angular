<section class="mb-3">
  <h2 class="text-2xl font-bold">Produtos</h2>
  <p class="text-sm text-slate-600">Cadastro de pecas e materiais.</p>
</section>

<section class="space-y-4">
  <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
    <form [formGroup]="form" class="grid gap-3 md:grid-cols-2 xl:grid-cols-4">
      <label class="grid gap-1"
        ><span class="text-sm">Nome</span><input class="input" formControlName="nome"
      /></label>
      <label class="grid gap-1 md:col-span-2"
        ><span class="text-sm">Descricao</span><input class="input" formControlName="descricao"
      /></label>
      <label class="grid gap-1"
        ><span class="text-sm">Valor</span
        ><input class="input" type="number" formControlName="valor"
      /></label>
      <label class="grid gap-1"
        ><span class="text-sm">Estoque</span
        ><input class="input" type="number" formControlName="estoque"
      /></label>
    </form>
    <div class="mt-3 flex gap-2">
      <button class="btn-primary" (click)="save()" [disabled]="form.invalid" type="button">
        Salvar
      </button>
      <button class="btn-ghost" (click)="resetForm()" type="button">Limpar</button>
    </div>
  </div>

  <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm overflow-x-auto">
    <table class="min-w-full text-sm">
      <thead class="bg-slate-50 text-left text-slate-600">
        <tr>
          <th class="px-3 py-2">ID</th>
          <th class="px-3 py-2">Nome</th>
          <th class="px-3 py-2">Valor</th>
          <th class="px-3 py-2">Estoque</th>
          <th class="px-3 py-2">Acoes</th>
        </tr>
      </thead>
      <tbody>
        @for (item of produtos; track item.id) {
          <tr class="border-t border-slate-100">
            <td class="px-3 py-2">{{ item.id }}</td>
            <td class="px-3 py-2">{{ item.nome }}</td>
            <td class="px-3 py-2">{{ item.valor | currency: 'BRL' }}</td>
            <td class="px-3 py-2">{{ item.estoque }}</td>
            <td class="px-3 py-2">
              <div class="flex gap-2">
                <button class="btn-ghost" (click)="edit(item)" type="button">Editar</button>
                <button
                  class="rounded-md border border-rose-300 px-2 py-1 text-rose-700"
                  (click)="remove(item)"
                  type="button"
                >
                  Excluir
                </button>
              </div>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</section>
