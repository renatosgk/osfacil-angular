<section class="mb-3">
  <h2 class="text-2xl font-bold">Ordens de Servico</h2>
  <p class="text-sm text-slate-600">Core do sistema: abertura, acompanhamento e conclusao de OS.</p>
</section>
<section class="space-y-4">
  <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
    <form [formGroup]="form" class="grid gap-3 md:grid-cols-2 xl:grid-cols-3">
      <label class="grid gap-1"
        ><span class="text-sm">Cliente</span
        ><select class="input" formControlName="clienteId">
          <option [ngValue]="null">Selecione</option>
          @for (item of clientes; track item.id) {
            <option [ngValue]="item.id">{{ item.nome }}</option>
          }
        </select></label
      >
      <label class="grid gap-1"
        ><span class="text-sm">Veiculo</span
        ><select class="input" formControlName="veiculoId">
          <option [ngValue]="null">Selecione</option>
          @for (item of veiculos; track item.id) {
            <option [ngValue]="item.id">{{ getVeiculoDesc(item.id) }}</option>
          }
        </select></label
      >
      <label class="grid gap-1"
        ><span class="text-sm">Funcionario</span
        ><select class="input" formControlName="funcionarioId">
          <option [ngValue]="null">Selecione</option>
          @for (item of funcionarios; track item.id) {
            <option [ngValue]="item.id">{{ item.nome }}</option>
          }
        </select></label
      >
      <label class="grid gap-1"
        ><span class="text-sm">Status</span
        ><select class="input" formControlName="status">
          <option value="ABERTA">Aberta</option>
          <option value="EM_ANDAMENTO">Em andamento</option>
          <option value="CONCLUIDA">Concluida</option>
          <option value="CANCELADA">Cancelada</option>
        </select></label
      >
      <label class="grid gap-1 md:col-span-2"
        ><span class="text-sm">Descricao</span><input class="input" formControlName="descricao"
      /></label>
      <label class="grid gap-1 md:col-span-2"
        ><span class="text-sm">Observacao</span><input class="input" formControlName="observacao"
      /></label>
    </form>
    <div class="mt-3 flex gap-2">
      <button class="btn-primary" (click)="save()" [disabled]="form.invalid" type="button">
        Salvar</button
      ><button class="btn-ghost" (click)="resetForm()" type="button">Limpar</button>
    </div>
  </div>

  <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
    <div class="grid gap-3 md:grid-cols-2">
      <label class="grid gap-1"
        ><span class="text-sm">Filtro por status</span
        ><select class="input" [formControl]="filtroForm.controls.status">
          <option value="">Todos</option>
          <option value="aberta">Aberta</option>
          <option value="andamento">Em andamento</option>
          <option value="concluida">Concluida</option>
          <option value="cancelada">Cancelada</option>
        </select></label
      >
      <label class="grid gap-1"
        ><span class="text-sm">Busca por cliente</span
        ><input class="input" [formControl]="filtroForm.controls.cliente"
      /></label>
    </div>

    <div class="mt-3 overflow-x-auto">
      <table class="min-w-full text-sm">
        <thead class="bg-slate-50 text-left text-slate-600">
          <tr>
            <th class="px-3 py-2">ID</th>
            <th class="px-3 py-2">Cliente</th>
            <th class="px-3 py-2">Veiculo</th>
            <th class="px-3 py-2">Status</th>
            <th class="px-3 py-2">Acoes</th>
          </tr>
        </thead>
        <tbody>
          @for (item of filteredOrdens; track item.id) {
            <tr class="border-t border-slate-100">
              <td class="px-3 py-2">#{{ item.id }}</td>
              <td class="px-3 py-2">{{ getClienteNome(getClienteId(item)) }}</td>
              <td class="px-3 py-2">{{ getVeiculoDesc(getVeiculoId(item)) }}</td>
              <td class="px-3 py-2"><app-status-badge [label]="getStatusLabel(item.status)" /></td>
              <td class="px-3 py-2">
                <div class="flex gap-2">
                  <a class="btn-ghost" [routerLink]="['/ordem-servicos', item.id]">Detalhes</a
                  ><button class="btn-ghost" (click)="edit(item)" type="button">Editar</button
                  ><button
                    class="rounded-md border border-rose-300 px-2 py-1 text-rose-700"
                    (click)="remove(item)"
                    type="button"
                  >
                    Excluir
                  </button>
                </div>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</section>
