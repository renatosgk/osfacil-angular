<section class="mb-3">
  <h2 class="text-2xl font-bold">Veiculos</h2>
  <p class="text-sm text-slate-600">Cadastro de veiculos vinculados a clientes.</p>
</section>

<section class="space-y-4">
  <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
    <form [formGroup]="form" class="grid gap-3 md:grid-cols-3 xl:grid-cols-6">
      <label class="grid gap-1">
        <span class="text-sm">Placa <span class="text-rose-500">*</span></span>
        <input class="input" formControlName="placa" placeholder="ABC-1234" />
      </label>
      <label class="grid gap-1">
        <span class="text-sm">Modelo <span class="text-rose-500">*</span></span>
        <input class="input" formControlName="modelo" placeholder="Civic, Gol..." />
      </label>
      <label class="grid gap-1">
        <span class="text-sm">Marca <span class="text-rose-500">*</span></span>
        <input class="input" formControlName="marca" placeholder="Honda, VW..." />
      </label>
      <label class="grid gap-1">
        <span class="text-sm">Cor <span class="text-rose-500">*</span></span>
        <input class="input" formControlName="cor" placeholder="Prata, Preto..." />
      </label>
      <label class="grid gap-1">
        <span class="text-sm">Ano <span class="text-rose-500">*</span></span>
        <input class="input" type="number" formControlName="ano" placeholder="2024" />
      </label>
      @if (auth.isStaff()) {
        <label class="grid gap-1">
          <span class="text-sm">Cliente <span class="text-rose-500">*</span></span>
          <select class="input" formControlName="clienteId">
            <option [ngValue]="null">Selecione</option>
            @for (cliente of clientes; track cliente.id) {
              <option [ngValue]="cliente.id">{{ cliente.nome }}</option>
            }
          </select>
        </label>
      }
    </form>
    <div class="mt-3 flex gap-2">
      <button class="btn-primary" (click)="save()" [disabled]="form.invalid" type="button">
        Salvar
      </button>
      <button class="btn-ghost" (click)="resetForm()" type="button">Limpar</button>
    </div>
  </div>

  <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm overflow-x-auto">
    <table class="min-w-full text-sm">
      <thead class="bg-slate-50 text-left text-slate-600">
        <tr>
          <th class="px-3 py-2">ID</th>
          <th class="px-3 py-2">Placa</th>
          <th class="px-3 py-2">Modelo</th>
          <th class="px-3 py-2">Cliente</th>
          <th class="px-3 py-2">Acoes</th>
        </tr>
      </thead>
      <tbody>
        @for (item of veiculos; track item.id) {
          <tr class="border-t border-slate-100">
            <td class="px-3 py-2">{{ item.id }}</td>
            <td class="px-3 py-2">{{ item.placa }}</td>
            <td class="px-3 py-2">{{ item.modelo }}</td>
            <td class="px-3 py-2">{{ getClienteNome(getClienteId(item)) }}</td>
            <td class="px-3 py-2">
              <div class="flex gap-2">
                <button class="btn-ghost" (click)="edit(item)" type="button">Editar</button
                ><button
                  class="rounded-md border border-rose-300 px-2 py-1 text-rose-700"
                  (click)="remove(item)"
                  type="button"
                >
                  Excluir
                </button>
              </div>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</section>
