<section class="mb-3">
  <h2 class="text-2xl font-bold">Funcionarios</h2>
  <p class="text-sm text-slate-600">Gestao do time tecnico e administrativo.</p>
</section>

<section class="space-y-4">
  <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
    <form [formGroup]="form" class="grid gap-3 md:grid-cols-2 xl:grid-cols-4">
      <label class="grid gap-1"
        ><span class="text-sm">Nome</span><input class="input" formControlName="nome"
      /></label>
      <label class="grid gap-1"
        ><span class="text-sm">Email</span><input class="input" formControlName="email"
      /></label>
      <label class="grid gap-1"
        ><span class="text-sm">Telefone</span><input class="input" formControlName="telefone"
      /></label>
      <label class="grid gap-1"
        ><span class="text-sm">Cargo</span><input class="input" formControlName="cargo"
      /></label>
    </form>
    <div class="mt-3 flex gap-2">
      <button class="btn-primary" (click)="save()" [disabled]="form.invalid" type="button">
        Salvar
      </button>
      <button class="btn-ghost" (click)="resetForm()" type="button">Limpar</button>
    </div>
  </div>

  <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
    <div class="overflow-x-auto">
      <table class="min-w-full text-sm">
        <thead class="bg-slate-50 text-left text-slate-600">
          <tr>
            <th class="px-3 py-2">ID</th>
            <th class="px-3 py-2">Nome</th>
            <th class="px-3 py-2">Email</th>
            <th class="px-3 py-2">Cargo</th>
            <th class="px-3 py-2">Acoes</th>
          </tr>
        </thead>
        <tbody>
          @for (item of funcionarios; track item.id) {
            <tr class="border-t border-slate-100">
              <td class="px-3 py-2">{{ item.id }}</td>
              <td class="px-3 py-2">{{ item.nome }}</td>
              <td class="px-3 py-2">{{ item.email }}</td>
              <td class="px-3 py-2">{{ item.cargo }}</td>
              <td class="px-3 py-2">
                <div class="flex gap-2">
                  <button class="btn-ghost" (click)="edit(item)" type="button">Editar</button>
                  <button
                    class="rounded-md border border-rose-300 px-2 py-1 text-rose-700"
                    (click)="remove(item)"
                    type="button"
                  >
                    Excluir
                  </button>
                </div>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</section>
