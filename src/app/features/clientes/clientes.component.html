<section class="mb-3">
  <h2 class="text-2xl font-bold">Clientes</h2>
  <p class="text-sm text-slate-600">Cadastro e busca de clientes.</p>
</section>

<section class="space-y-4">
  <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
    <form [formGroup]="form" class="grid gap-3 md:grid-cols-2 xl:grid-cols-3">
      <label class="grid gap-1">
        <span class="text-sm">Nome</span>
        <input class="input" formControlName="nome" />
      </label>
      <label class="grid gap-1">
        <span class="text-sm">Email</span>
        <input class="input" formControlName="email" />
      </label>
      <label class="grid gap-1">
        <span class="text-sm">Telefone</span>
        <input class="input" formControlName="telefone" />
      </label>
      <label class="grid gap-1">
        <span class="text-sm">Documento</span>
        <input class="input" formControlName="documento" />
      </label>
      <label class="grid gap-1 md:col-span-2 xl:col-span-2">
        <span class="text-sm">Endereco</span>
        <input class="input" formControlName="endereco" />
      </label>
    </form>
    <div class="mt-3 flex gap-2">
      <button class="btn-primary" (click)="save()" [disabled]="form.invalid" type="button">
        Salvar
      </button>
      <button class="btn-ghost" (click)="resetForm()" type="button">Limpar</button>
    </div>
  </div>

  <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
    <label class="grid max-w-md gap-1">
      <span class="text-sm">Busca por cliente</span>
      <input class="input" [formControl]="searchForm.controls.termo" placeholder="Nome ou email" />
    </label>

    <div class="mt-3 overflow-x-auto">
      <table class="min-w-full text-sm">
        <thead class="bg-slate-50 text-left text-slate-600">
          <tr>
            <th class="px-3 py-2">ID</th>
            <th class="px-3 py-2">Nome</th>
            <th class="px-3 py-2">Email</th>
            <th class="px-3 py-2">Telefone</th>
            <th class="px-3 py-2">Acoes</th>
          </tr>
        </thead>
        <tbody>
          @for (item of filteredClientes; track item.id) {
            <tr class="border-t border-slate-100">
              <td class="px-3 py-2">{{ item.id }}</td>
              <td class="px-3 py-2">{{ item.nome }}</td>
              <td class="px-3 py-2">{{ item.email }}</td>
              <td class="px-3 py-2">{{ item.telefone }}</td>
              <td class="px-3 py-2">
                <div class="flex gap-2">
                  <button class="btn-ghost" (click)="edit(item)" type="button">Editar</button>
                  <button
                    class="rounded-md border border-rose-300 px-2 py-1 text-rose-700"
                    (click)="remove(item)"
                    type="button"
                  >
                    Excluir
                  </button>
                </div>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</section>
