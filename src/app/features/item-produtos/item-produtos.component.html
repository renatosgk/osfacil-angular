<section class="mb-3">
  <h2 class="text-2xl font-bold">Itens de Produto</h2>
  <p class="text-sm text-slate-600">Vinculacao de produtos nas ordens de servico.</p>
</section>
<section class="space-y-4">
  <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
    <form [formGroup]="form" class="grid gap-3 md:grid-cols-2 xl:grid-cols-4">
      <label class="grid gap-1"
        ><span class="text-sm">Ordem de Servico</span
        ><select class="input" formControlName="ordemServicoId">
          <option [ngValue]="null">Selecione</option>
          @for (item of ordens; track item.id) {
            <option [ngValue]="item.id">OS #{{ item.id }}</option>
          }
        </select></label
      >
      <label class="grid gap-1"
        ><span class="text-sm">Produto</span
        ><select class="input" formControlName="produtoId">
          <option [ngValue]="null">Selecione</option>
          @for (item of produtos; track item.id) {
            <option [ngValue]="item.id">{{ item.nome }}</option>
          }
        </select></label
      >
      <label class="grid gap-1"
        ><span class="text-sm">Quantidade</span
        ><input class="input" type="number" formControlName="quantidade"
      /></label>
      <label class="grid gap-1"
        ><span class="text-sm">Valor Unitario</span
        ><input class="input" type="number" formControlName="valorUnitario"
      /></label>
    </form>
    <div class="mt-3 flex gap-2">
      <button class="btn-primary" (click)="save()" [disabled]="form.invalid" type="button">
        Salvar</button
      ><button class="btn-ghost" (click)="resetForm()" type="button">Limpar</button>
    </div>
  </div>

  <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm overflow-x-auto">
    <table class="min-w-full text-sm">
      <thead class="bg-slate-50 text-left text-slate-600">
        <tr>
          <th class="px-3 py-2">ID</th>
          <th class="px-3 py-2">OS</th>
          <th class="px-3 py-2">Produto</th>
          <th class="px-3 py-2">Quantidade</th>
          <th class="px-3 py-2">Acoes</th>
        </tr>
      </thead>
      <tbody>
        @for (item of itens; track item.id) {
          <tr class="border-t border-slate-100">
            <td class="px-3 py-2">{{ item.id }}</td>
            <td class="px-3 py-2">{{ item.ordemServicoId ?? item['ordem_servico_id'] }}</td>
            <td class="px-3 py-2">{{ getProdutoNome(getProdutoId(item)) }}</td>
            <td class="px-3 py-2">{{ item.quantidade }}</td>
            <td class="px-3 py-2">
              <div class="flex gap-2">
                <button class="btn-ghost" (click)="edit(item)" type="button">Editar</button
                ><button
                  class="rounded-md border border-rose-300 px-2 py-1 text-rose-700"
                  (click)="remove(item)"
                  type="button"
                >
                  Excluir
                </button>
              </div>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</section>
